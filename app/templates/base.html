<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Medici Analytica{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="topnav">
        <span class="brand">Medici Analytica</span>
        {% if user %}
        <a href="/">Dashboard</a>
        <a href="/invoices">Faktury</a>
        <a href="/bank">Banka</a>
        <a href="/ledger">Účetnictví</a>
        <a href="/reports">Výkazy</a>
        <span class="user-info">{{ user.full_name }} ({{ user.role }})</span>
        <a href="/auth/logout">Odhlásit</a>
        {% endif %}
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
