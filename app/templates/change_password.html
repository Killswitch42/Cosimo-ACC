{% extends "base.html" %}
{% block title %}Změna hesla – Medici Analytica{% endblock %}
{% block content %}
<h1>Změna hesla</h1>

<div class="panel" style="max-width:420px">
    {% if error %}<p class="badge badge-blocker" style="display:block;padding:0.5rem">⚠ {{ error }}</p>{% endif %}
    {% if success %}<p class="badge badge-info" style="display:block;padding:0.5rem">✓ {{ success }}</p>{% endif %}
    <form method="post" action="/auth/change-password">
        <p><label>Současné heslo<br><input type="password" name="current_password" required></label></p>
        <p><label>Nové heslo (min. 8 znaků)<br><input type="password" name="new_password" required></label></p>
        <p><label>Potvrzení nového hesla<br><input type="password" name="confirm_password" required></label></p>
        <button type="submit">Změnit heslo</button>
    </form>
</div>
{% endblock %}
